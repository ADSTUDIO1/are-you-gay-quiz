<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    min-height: 100vh;
}

body {
    padding: 20px;
    background: linear-gradient(-45deg,#ff00cc,#6a00ff,#3333ff,#00c6ff);
    background-size: 400% 400%;
    animation: bg 12s infinite;
}

@keyframes bg {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container {
    width: 95%;
    max-width: 700px;
    margin: auto;
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 18px;
}

button {
    display: block;
    margin: 12px auto;
    padding: 15px;
    width: 100%;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    cursor: pointer;
}

#stats { font-size: 14px; margin-bottom: 10px; }
#progress { font-size: 14px; margin-bottom: 10px; }

.hidden { display: none; }
</style>
</head>

<!-- MENU -->

    <h1>✨ Quiz Hub ✨</h1>
    <p>Pick a quiz 👇</p>

    <button onclick="startQuiz('happy')">😊 Are You Happy?</button>
</div>

<div id="stats"></div>

<!-- QUIZ AREA -->

    <div id="quiz"></div>

// logic
let currentQuiz = [];
let current = 0;
let score = 0;

function startQuiz(type){
    currentQuiz = quizzes[type];
    current = 0;
    score = 0;

    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quizSection").classList.remove("hidden");

    loadQuestion();
}

function goHome(){
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("quizSection").classList.add("hidden");
    document.getElementById("quiz").innerHTML = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("progress").innerHTML = "";
}

function loadQuestion(){
    const quiz = document.getElementById("quiz");
    const progress = document.getElementById("progress");

    if(current >= currentQuiz.length){
        showResult();
        return;
    }

    progress.innerHTML = `Question ${current+1}/${currentQuiz.length}`;
    quiz.innerHTML = "<h2>" + currentQuiz[current].q + "</h2>";

    currentQuiz[current].a.forEach(ans=>{
        let btn = document.createElement("button");
        btn.innerText = ans.text;

        btn.onclick = ()=>{
            quiz.innerHTML = "<h3>Analyzing...</h3>";
            setTimeout(()=>{
                score += ans.score;
                current++;
                loadQuestion();
            }, 600);
        };

        quiz.appendChild(btn);
    });
}

function showResult(){
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");

    quiz.innerHTML = "";

    let text = "";

    if(score >= currentQuiz.length * 1.5){
        text = "🤔 strong results detected";
    } else if(score >= currentQuiz.length * 0.8){
        text = "😐 mixed vibes";
    } else {
        text = "😎 pretty balanced";
    }

    result.innerHTML = `
        ${text}

        <br><br>
        <button onclick="goHome()">Try Another Quiz</button>

        <br><br>
        <p style="font-size:14px; opacity:0.8;">
            If this made you laugh, consider supporting 👇
        </p>

        <a href="https://www.paypal.me/YourName/1" target="_blank">
            <button style="background:#ffc439;color:black;font-weight:bold;">
                💛 Support this site ($1)
            </button>
        </a>
    `;
}
