<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hub ✨</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    min-height: 100vh;
    background: linear-gradient(-45deg,#ff00cc,#6a00ff,#3333ff,#00c6ff);
    background-size: 400% 400%;
    animation: bg 12s infinite;
    padding: 20px;
}

@keyframes bg {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container {
    max-width: 700px;
    margin: auto;
    background: rgba(0,0,0,0.65);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
    margin-bottom: 5px;
}

p {
    opacity: 0.8;
}

button {
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(135deg,#ffffff,#dddddd);
    color: black;
    transition: all 0.25s ease;
}

button:hover {
    transform: scale(1.03);
    background: white;
}

button:active {
    transform: scale(0.97);
}

.hidden {
    display: none;
}

.fade {
    animation: fade 0.4s ease;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* Progress Bar */
.progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-fill {
    height: 100%;
    background: white;
    width: 0%;
    transition: width 0.3s ease;
}

#stats {
    font-size: 13px;
    margin-bottom: 10px;
    opacity: 0.8;
}

.result-box {
    font-size: 20px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<div id="menu" class="fade">
    <h1>✨ Quiz Hub</h1>
    <p>Pick a quiz 👇</p>

    <button onclick="startQuiz('vibe')">🎭 Vibe Check</button>
    <button onclick="startQuiz('happy')">😊 Are You Happy?</button>
</div>

<div id="stats"></div>

<div id="quizSection" class="hidden fade">
    <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <div id="progressText"></div>
    <div id="quiz"></div>
    <div id="result"></div>

    <button onclick="goHome()">⬅ Back</button>
</div>

</div>

<script>

// stats
let totalUsers = 10000 + Math.floor(Math.random()*200);
let percent = 50;

function updateStats(){
    totalUsers += Math.floor(Math.random()*2);
    document.getElementById("stats").innerHTML =
        "🌍 " + totalUsers.toLocaleString() + " people took this quiz<br>" +
        "✨ " + percent + "% got chaotic results";
}
setInterval(updateStats, 3000);
updateStats();

// QUIZZES (unchanged)
const quizzes = { /* KEEP YOUR QUIZ DATA EXACTLY THE SAME HERE */ };

// logic
let currentQuiz = [];
let current = 0;
let score = 0;

function startQuiz(type){
    currentQuiz = quizzes[type];
    current = 0;
    score = 0;

    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quizSection").classList.remove("hidden");

    loadQuestion();
}

function goHome(){
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("quizSection").classList.add("hidden");
    document.getElementById("quiz").innerHTML = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("progressText").innerHTML = "";
    document.getElementById("progressFill").style.width = "0%";
}

function loadQuestion(){
    const quiz = document.getElementById("quiz");

    if(current >= currentQuiz.length){
        showResult();
        return;
    }

    // progress
    let percent = (current / currentQuiz.length) * 100;
    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText =
        `Question ${current+1} of ${currentQuiz.length}`;

    quiz.innerHTML = `<h2>${currentQuiz[current].q}</h2>`;

    currentQuiz[current].a.forEach(ans=>{
        let btn = document.createElement("button");
        btn.innerText = ans.text;

        btn.onclick = ()=>{
            quiz.innerHTML = "<h3 class='fade'>Analyzing...</h3>";

            setTimeout(()=>{
                score += ans.score;
                current++;
                loadQuestion();
            }, 500);
        };

        quiz.appendChild(btn);
    });
}

function showResult(){
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");

    quiz.innerHTML = "";

    let text = "";

    if(score >= currentQuiz.length * 1.5){
        text = "🤔 Strong results detected";
    } else if(score >= currentQuiz.length * 0.8){
        text = "😐 Mixed vibes";
    } else {
        text = "😎 Pretty balanced";
    }

    result.innerHTML = `
        <div class="result-box fade">${text}</div>

        <button onclick="goHome()">Try Another Quiz</button>

        <p style="font-size:13px; opacity:0.7;">
            If this made you smile 👇
        </p>

        <a href="https://www.paypal.me/zkaterswrldd/1" target="_blank">
            <button style="background:#ffc439;color:black;font-weight:bold;">
                💛 Support ($1)
            </button>
        </a>
    `;
}

</script>

</body>
</html>
