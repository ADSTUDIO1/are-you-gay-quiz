<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Are You Gay? 🤨✨</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
}

body{
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px;

    background: linear-gradient(-45deg,#ff00cc,#6a00ff,#3333ff,#00c6ff);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* floating bubbles */
.bubble{
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    animation: float linear infinite;
    pointer-events: none;
}

@keyframes float{
    from{transform:translateY(100vh)}
    to{transform:translateY(-120px)}
}

.container{
    width: 95%;
    max-width: 700px;
    margin: auto;
    background: rgba(0,0,0,0.55);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 30px rgba(255,255,255,0.15);
}

h1{font-size:28px;}
h2{font-size:20px;}

button{
    display:block;
    margin:12px auto;
    padding:16px;
    width:100%;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    min-height:50px;
    transition:0.2s;
}

button:hover{ transform:scale(1.04); }
button.clicked{ transform:scale(0.95); }

#stats{ font-size:14px; margin-bottom:15px; }
#progress{ font-size:14px; margin-bottom:10px; opacity:0.85; }

.fade{ opacity:0; transition:0.3s; }
.show{ opacity:1; }

/* mobile tweaks */
@media (max-width:600px){
    h1{font-size:24px;}
    h2{font-size:18px;}
}
</style>
</head>

<body>

<div class="container">
    <h1>✨ Are You Gay? ✨</h1>
    <p>(100% scientifically questionable)</p>

    <div id="stats"></div>
    <div id="progress"></div>
    <div id="quiz" class="show"></div>
    <div id="result"></div>
</div>

<script>
// bubbles
for(let i=0;i<15;i++){
    let b=document.createElement("div");
    b.className="bubble";
    let size=Math.random()*80+30;
    b.style.width=size+"px";
    b.style.height=size+"px";
    b.style.left=Math.random()*100+"vw";
    b.style.animationDuration=(Math.random()*8+8)+"s";
    document.body.appendChild(b);
}

// QUESTIONS (20)
const questions = [
{q:"You hear a new song. Reaction?",a:[
{text:"added to crying playlist instantly",score:2},
{text:"nice beat",score:1},
{text:"skip",score:0}]},

{q:"Your camera roll?",a:[
{text:"too many selfies",score:2},
{text:"normal amount",score:1},
{text:"none",score:0}]},

{q:"Outfit vibe?",a:[
{text:"aesthetic layers",score:2},
{text:"hoodie",score:1},
{text:"random clothes",score:0}]},

{q:"Someone says 'slay'",a:[
{text:"PERIOD",score:2},
{text:"ok",score:1},
{text:"what",score:0}]},

{q:"Spotify wrapped?",a:[
{text:"emotional damage",score:2},
{text:"fine",score:1},
{text:"don't use it",score:0}]},

{q:"Lighting for selfies?",a:[
{text:"golden hour",score:2},
{text:"mirror",score:1},
{text:"flash",score:0}]},

{q:"Favorite app?",a:[
{text:"TikTok",score:2},
{text:"Instagram",score:1},
{text:"Discord",score:0}]},

{q:"Room vibe?",a:[
{text:"LED cozy chaos",score:2},
{text:"clean",score:1},
{text:"mess",score:0}]},

{q:"Texting style?",a:[
{text:"paragraphs",score:2},
{text:"normal",score:1},
{text:"k",score:0}]},

{q:"Emoji?",a:[
{text:"✨",score:2},
{text:"😂",score:1},
{text:"none",score:0}]},

{q:"Compliment?",a:[
{text:"omg stunning",score:2},
{text:"nice",score:1},
{text:"cool",score:0}]},

{q:"Pinterest?",a:[
{text:"yes",score:2},
{text:"kinda",score:1},
{text:"no",score:0}]},

{q:"Say 'bro'?",a:[
{text:"ironically",score:2},
{text:"sometimes",score:1},
{text:"always",score:0}]},

{q:"Sit in chair?",a:[
{text:"weird",score:2},
{text:"slightly weird",score:1},
{text:"normal",score:0}]},

{q:"Celebrity crush?",a:[
{text:"complicated",score:2},
{text:"normal",score:1},
{text:"none",score:0}]},

{q:"Movie type?",a:[
{text:"romance",score:2},
{text:"comedy",score:1},
{text:"action",score:0}]},

{q:"Aesthetic?",a:[
{text:"everything",score:2},
{text:"somewhat",score:1},
{text:"no",score:0}]},

{q:"Texts?",a:[
{text:"many emojis",score:2},
{text:"balanced",score:1},
{text:"dry",score:0}]},

{q:"Say iconic?",a:[
{text:"daily",score:2},
{text:"rarely",score:1},
{text:"never",score:0}]},

{q:"Final: vibe check?",a:[
{text:"pass",score:2},
{text:"maybe",score:1},
{text:"fail",score:0}]}
];

let current=0;
let score=0;

// stats start 10k
let totalUsers=10000 + Math.floor(Math.random()*200);
let percent=50;

function updateStats(){
    totalUsers += Math.floor(Math.random()*2);
    document.getElementById("stats").innerHTML=
        "🌍 "+totalUsers.toLocaleString()+" people took this quiz<br>"+
        "🌈 "+percent+"% got certified";
}
setInterval(updateStats,3000);
updateStats();

function loadQuestion(){
    const quiz=document.getElementById("quiz");
    const progress=document.getElementById("progress");

    if(current>=questions.length){
        showResult();
        return;
    }

    progress.innerHTML=`Question ${current+1} / ${questions.length}`;

    quiz.classList.add("fade");

    setTimeout(()=>{
        let q=questions[current];
        quiz.innerHTML="<h2>"+q.q+"</h2>";

        q.a.forEach(ans=>{
            let btn=document.createElement("button");
            btn.innerText=ans.text;

            btn.onclick=()=>{
                btn.classList.add("clicked");

                setTimeout(()=>{
                    quiz.innerHTML="<h3>🧠 analyzing your vibe...</h3>";
                    setTimeout(()=>{
                        score+=ans.score;
                        current++;
                        loadQuestion();
                    },800);
                },150);
            };

            quiz.appendChild(btn);
        });

        quiz.classList.remove("fade");
    },300);
}

function showResult(){
    let quiz=document.getElementById("quiz");
    let result=document.getElementById("result");

    quiz.innerHTML="";

    let text="";

    if(score>=30){
        text="🌈 Certified Vibe Legend 🌈";
        percent=Math.min(99,percent+1);
    }else if(score>=18){
        text="🤨 Suspiciously Stylish 🤨";
    }else{
        text="😎 Just Vibing 😎";
    }

    result.innerHTML=text+"<br><br><button onclick='location.reload()'>Retry</button>";
}

loadQuestion();
</script>

</body>
</html>
