@keyframes bg{

50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{

background:rgba(0,0,0,0.55);

width:100%;border:none;border-radius:12px;

let currentQuiz=null;
let index=0;
let score=0;

function startQuiz(type){
currentQuiz=quizzes[type];
index=0;
score=0;

document.getElementById("menu").style.display="none";
document.getElementById("backBtn").style.display="block";

loadQuestion();
}

function loadQuestion(){
let quiz=document.getElementById("quiz");
let progress=document.getElementById("progress");

if(index>=currentQuiz.length){
showResult();
return;
}

progress.innerHTML=`Question ${index+1}/${currentQuiz.length}`;
quiz.innerHTML="<h2>"+currentQuiz[index].q+"</h2>";

currentQuiz[index].a.forEach(ans=>{
let btn=document.createElement("button");
btn.innerText=ans.text;

btn.onclick=()=>{
quiz.innerHTML="<h3>analyzing...</h3>";
setTimeout(()=>{
score+=ans.score;
index++;
loadQuestion();
},700);
};

quiz.appendChild(btn);
});
}

function showResult(){
let result=document.getElementById("result");
let quiz=document.getElementById("quiz");

quiz.innerHTML="";

let text="";

if(score>currentQuiz.length*1.5){
text="⚠️ you might need more rest & support";
}else if(score>currentQuiz.length*0.8){
text="🤔 mixed feelings detected";
}else{
text="😊 you seem pretty happy overall";
}

result.innerHTML=text+"<br><br><button onclick='goHome()'>Back</button>";
}

function goHome(){
document.getElementById("menu").style.display="block";
document.getElementById("quiz").innerHTML="";
document.getElementById("result").innerHTML="";
document.getElementById("progress").innerHTML="";
document.getElementById("backBtn").style.display="none";
}
